name: Deploy to Coolify

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: 'Deployment action'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - migrate
          - logs
          - restart

env:
  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
  DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
  DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}

jobs:
  deploy:
    name: Deploy BioTree
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_mysql, redis, gd, mbstring, intl, zip
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install NPM dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script: |
            # Stop current container
            docker stop biotree-app 2>/dev/null || true
            docker rm biotree-app 2>/dev/null || true
            
            # Run new container with latest image
            docker run -d \
              --name biotree-app \
              --network coolify \
              --restart unless-stopped \
              --label 'coolify.managed=true' \
              --label 'coolify.type=application' \
              -p 80:80 -p 443:443 \
              7c1bc338-b6d8-4238-8463-3da8db09cb60:latest
            
            # Wait for startup
            sleep 10
            
            # Setup environment
            docker exec biotree-app sh -c '
              cp /var/www/html/.env.example /var/www/html/.env 2>/dev/null || true
              php artisan key:generate --force
              php artisan migrate --force
              php artisan config:cache
            '
            
            # Restart to apply changes
            docker restart biotree-app

  migrate:
    name: Run Migrations
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.inputs.action == 'migrate'
    
    steps:
      - name: Run Migrations via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script: |
            docker exec biotree-app php artisan migrate --force
            docker exec biotree-app php artisan config:cache

  logs:
    name: View Logs
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.inputs.action == 'logs'

    steps:
      - name: Get Logs via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script: |
            docker logs --tail 100 biotree-app 2>&1

  restart:
    name: Restart App
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.inputs.action == 'restart'

    steps:
      - name: Restart via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script: |
            docker restart biotree-app
